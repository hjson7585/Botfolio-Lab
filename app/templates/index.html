<!DOCTYPE html>
<!-- 이 문서가 HTML5 형식이라는 것을 브라우저에 알려줌 -->

<html>
<!-- HTML 문서의 시작 -->

<head>
    <!-- 브라우저 탭에 표시될 웹페이지 제목 -->
    <title>AI Stock Agent</title>
</head>

<body>
    <!-- 실제 화면에 보이는 내용이 들어가는 부분 -->

    <h1>AI Stock Agent</h1>
    <!-- 페이지의 가장 큰 제목 -->

    <h2>실시간 포트폴리오</h2>
    <!-- 섹션 제목: 실시간 포트폴리오 화면이라는 뜻 -->

    <table border="1">
        <!-- 표(table) 시작 -->
        <!-- border="1"은 표 테두리를 간단히 보이게 하는 기본 설정 -->

        <thead>
            <!-- 표의 제목 부분(헤더 영역) -->
            <tr>
                <!-- 헤더 한 줄 시작 -->
                <th>종목</th>
                <!-- 종목명 제목 칸 -->

                <th>수량</th>
                <!-- 보유 수량 제목 칸 -->

                <th>평균가</th>
                <!-- 평균 매수가 제목 칸 -->

                <th>현재가</th>
                <!-- 현재 주가 제목 칸 -->

                <th>현재 자산</th>
                <!-- 현재 평가 금액 제목 칸 -->
            </tr>
        </thead>

        <tbody id="portfolio-body">
            <!-- 표의 실제 데이터가 들어갈 본문 영역 -->
            <!-- JavaScript에서 이 부분에 실시간으로 <tr> 내용을 넣어줌 -->
        </tbody>

    </table>
    <!-- 표 끝 -->

    <h3>
        총 자산:
        <span id="total-value">$0</span>
        <!-- 총 자산 금액이 표시될 부분 -->
        <!-- 처음에는 $0으로 보이고, 이후 JavaScript가 값을 바꿔줌 -->
    </h3>

    <script src="/static/app.js"></script>
    <!-- 외부 JavaScript 파일 연결 -->
    <!-- /static/app.js 파일이 실행되면서 WebSocket 연결 및 실시간 화면 갱신 처리 -->

</body>

</html>
